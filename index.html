<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Financial Statement Analyzer</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      text-align: center;
    }
    #dropZone {
      border: 2px dashed #3b82f6;
      padding: 40px;
      width: 60%;
      margin: 40px auto;
      background: white;
    }
    #dropZone.hover {
      background: #e0f2fe;
    }
    #output {
      width: 80%;
      margin: auto;
      background: white;
      padding: 20px;
      text-align: left;
    }
  </style>
</head>
<body>

<h1>Advanced Financial Statement Analyzer</h1>

<div id="dropZone">Drop PDF, CSV, or TXT Financial Statements</div>

<div id="output">
  <h2>Results</h2>
  <div id="results"></div>
</div>

<script>
const dropZone = document.getElementById("dropZone");
const resultsDiv = document.getElementById("results");

// Drag UI
dropZone.addEventListener("dragover", e => {
  e.preventDefault();
  dropZone.classList.add("hover");
});

dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("hover");
});

dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("hover");

  const file = e.dataTransfer.files[0];
  if (!file) return;

  resultsDiv.innerHTML = "<p>Processing file...</p>";

  if (file.type === "application/pdf") {
    handlePDF(file);
  } else {
    handleText(file);
  }
});

// -------- PDF HANDLING --------
async function handlePDF(file) {
  const reader = new FileReader();

  reader.onload = async function(e) {
    try {
      const pdf = await pdfjsLib.getDocument(
        new Uint8Array(e.target.result)
      ).promise;

      let lines = [];

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();

        // Rebuild lines based on Y position
        let pageLines = {};
        content.items.forEach(item => {
          const y = Math.round(item.transform[5]);

          if (!pageLines[y]) pageLines[y] = [];
          pageLines[y].push(item.str);
        });

        Object.values(pageLines).forEach(lineArr => {
          const line = lineArr.join(" ");
          lines.push(line);
        });
      }

      processLines(lines);

    } catch (err) {
      resultsDiv.innerHTML = "<p>Error reading PDF.</p>";
      console.error(err);
    }
  };

  reader.readAsArrayBuffer(file);
}

// -------- TEXT/CSV HANDLING --------
function handleText(file) {
  const reader = new FileReader();

  reader.onload = e => {
    const lines = e.target.result.split("\n");
    processLines(lines);
  };

  reader.readAsText(file);
}

// -------- CORE PROCESSING --------
function processLines(lines) {
  const extracted = extractFinancialData(lines);

  if (Object.keys(extracted).length === 0) {
    resultsDiv.innerHTML = "<p>No financial data detected.</p>";
    return;
  }

  const kpis = calculateKPIs(extracted);
  display(extracted, kpis);
}

// -------- SMART EXTRACTION --------
function extractFinancialData(lines) {
  const patterns = {
    revenue: /revenue|total sales/i,
    cogs: /cost of goods|cogs/i,
    expenses: /operating expenses|total expenses/i,
    netIncome: /net income|net profit/i,
    grossProfit: /gross profit/i
  };

  let data = {};

  lines.forEach(line => {
    const value = extractNumber(line);
    if (value === null) return;

    for (let key in patterns) {
      if (patterns[key].test(line)) {
        data[key] = value;
      }
    }
  });

  return data;
}

// -------- NUMBER PARSER --------
function extractNumber(text) {
  const match = text.match(/-?\$?\(?\d{1,3}(,\d{3})*(\.\d+)?\)?/);
  if (!match) return null;

  let num = match[0]
    .replace(/[$,]/g, "")
    .replace("(", "-")
    .replace(")", "");

  return parseFloat(num);
}

// -------- KPI CALCULATIONS --------
function calculateKPIs(data) {
  const revenue = data.revenue || 0;
  const expenses = data.expenses || 0;
  const netIncome = data.netIncome || (revenue - expenses);

  const profitMargin = revenue ? (netIncome / revenue) * 100 : 0;

  return {
    revenue,
    expenses,
    netIncome,
    profitMargin: profitMargin.toFixed(2)
  };
}

// -------- DISPLAY --------
function display(data, kpis) {
  let html = "<h3>Extracted Financials</h3><ul>";

  for (let key in data) {
    html += `<li><b>${key}</b>: $${data[key]}</li>`;
  }

  html += "</ul>";

  html += "<h3>KPIs</h3>";
  html += `
    <ul>
      <li>Revenue: $${kpis.revenue}</li>
      <li>Expenses: $${kpis.expenses}</li>
      <li>Net Income: $${kpis.netIncome}</li>
      <li>Profit Margin: ${kpis.profitMargin}%</li>
    </ul>
  `;

  resultsDiv.innerHTML = html;
}
</script>

</body>
</html>
