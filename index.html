<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Financial Statement Analyzer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    h1 {
      background: #1f2937;
      color: white;
      padding: 20px;
      margin: 0;
    }
    #dropZone {
      border: 2px dashed #3b82f6;
      border-radius: 10px;
      padding: 40px;
      margin: 40px auto;
      width: 60%;
      background: white;
      cursor: pointer;
    }
    #dropZone.hover {
      background: #e0f2fe;
    }
    #output {
      width: 80%;
      margin: 20px auto;
      text-align: left;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }
    th {
      background: #3b82f6;
      color: white;
    }
  </style>
</head>
<body>

<h1>Financial Statement Analyzer</h1>

<div id="dropZone">Drag & Drop Financial Files Here (CSV or TXT)</div>

<div id="output">
  <h2>Extracted Data & KPIs</h2>
  <div id="results"></div>
</div>

<script>
const dropZone = document.getElementById("dropZone");
const resultsDiv = document.getElementById("results");

dropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropZone.classList.add("hover");
});

dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("hover");
});

dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("hover");

  const files = e.dataTransfer.files;
  if (files.length > 0) {
    handleFile(files[0]);
  }
});

function handleFile(file) {
  const reader = new FileReader();

  reader.onload = function(e) {
    const text = e.target.result;

    // Split into "pages" (basic heuristic for TXT/CSV dumps)
    const pages = text.split(/\f|\n\s*\n\s*\n/);

    let validData = [];

    pages.forEach(page => {
      if (isFinancialPage(page)) {
        const parsed = parseCSV(page);
        if (parsed.length > 0) {
          validData = validData.concat(parsed);
        }
      }
    });

    if (validData.length === 0) {
      resultsDiv.innerHTML = "<p>No usable financial data detected.</p>";
      return;
    }

    const kpis = calculateKPIs(validData);
    displayResults(validData, kpis);
  };

  reader.readAsText(file);
}

// 🔍 Detect if a page likely contains financial data
function isFinancialPage(text) {
  const keywords = [
    "revenue", "sales", "income",
    "expenses", "cost", "net income",
    "profit", "loss"
  ];

  const hasKeyword = keywords.some(k =>
    text.toLowerCase().includes(k)
  );

  // Check for presence of numbers (financial data)
  const hasNumbers = /\d/.test(text);

  return hasKeyword && hasNumbers;
}

function parseCSV(text) {
  const lines = text.split("\n").filter(l => l.trim() !== "");

  // Require at least header + 1 row
  if (lines.length < 2) return [];

  const headers = lines[0].split(",").map(h => h.trim());

  // Must contain at least one financial column
  const validHeaders = headers.some(h =>
    ["revenue","expenses","income","cost","profit"]
      .includes(h.toLowerCase())
  );

  if (!validHeaders) return [];

  const rows = lines.slice(1).map(line => {
    const values = line.split(",");
    let obj = {};
    headers.forEach((h, i) => {
      const val = values[i];
      obj[h] = isNaN(val) ? val : parseFloat(val);
    });
    return obj;
  });

  return rows;
}

function calculateKPIs(data) {
  let revenue = 0;
  let expenses = 0;

  data.forEach(row => {
    Object.keys(row).forEach(key => {
      const lower = key.toLowerCase();
      if (lower.includes("revenue") || lower.includes("sales")) {
        revenue += Number(row[key]) || 0;
      }
      if (lower.includes("expense") || lower.includes("cost")) {
        expenses += Number(row[key]) || 0;
      }
    });
  });

  const netIncome = revenue - expenses;
  const profitMargin = revenue ? (netIncome / revenue) * 100 : 0;

  return {
    revenue,
    expenses,
    netIncome,
    profitMargin: profitMargin.toFixed(2)
  };
}

function displayResults(data, kpis) {
  let html = "<h3>KPIs</h3>";
  html += `
    <table>
      <tr><th>Metric</th><th>Value</th></tr>
      <tr><td>Total Revenue</td><td>$${kpis.revenue.toFixed(2)}</td></tr>
      <tr><td>Total Expenses</td><td>$${kpis.expenses.toFixed(2)}</td></tr>
      <tr><td>Net Income</td><td>$${kpis.netIncome.toFixed(2)}</td></tr>
      <tr><td>Profit Margin</td><td>${kpis.profitMargin}%</td></tr>
    </table>
  `;

  html += "<h3>Valid Extracted Data Only</h3><table><tr>";

  Object.keys(data[0]).forEach(key => {
    html += `<th>${key}</th>`;
  });

  html += "</tr>";

  data.forEach(row => {
    html += "<tr>";
    Object.values(row).forEach(val => {
      html += `<td>${val}</td>`;
    });
    html += "</tr>";
  });

  html += "</table>";

  resultsDiv.innerHTML = html;
}
</script>

</body>
</html>
