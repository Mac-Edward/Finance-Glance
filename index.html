<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Financial Statement Analyzer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; text-align:center; }
#dropZone {
  border:2px dashed #3b82f6;
  padding:40px;
  margin:40px auto;
  width:60%;
  background:white;
}
#dropZone.hover { background:#e0f2fe; }
#output {
  width:85%;
  margin:auto;
  background:white;
  padding:20px;
  text-align:left;
}
</style>
</head>

<body>

<h1>AI Financial Analyzer</h1>
<div id="dropZone">Drop ANY Financial File (PDF, CSV, TXT)</div>

<div id="output">
  <h2>Analysis</h2>
  <div id="results"></div>
</div>

<script>
const dropZone = document.getElementById("dropZone");
const resultsDiv = document.getElementById("results");

// ---------------- DRAG DROP ----------------
dropZone.addEventListener("dragover", e=>{
  e.preventDefault(); dropZone.classList.add("hover");
});
dropZone.addEventListener("dragleave", ()=>dropZone.classList.remove("hover"));

dropZone.addEventListener("drop", e=>{
  e.preventDefault();
  dropZone.classList.remove("hover");

  const file = e.dataTransfer.files[0];
  if(!file) return;

  resultsDiv.innerHTML = "Processing...";

  if(file.type === "application/pdf") handlePDF(file);
  else handleText(file);
});

// ---------------- FILE HANDLING ----------------
async function handlePDF(file){
  const reader = new FileReader();
  reader.onload = async function(e){
    const pdf = await pdfjsLib.getDocument(new Uint8Array(e.target.result)).promise;
    let lines=[];

    for(let i=1;i<=pdf.numPages;i++){
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();

      let map={};
      content.items.forEach(item=>{
        const y = Math.round(item.transform[5]);
        if(!map[y]) map[y]=[];
        map[y].push(item.str);
      });

      Object.values(map).forEach(arr=>{
        lines.push(arr.join(" "));
      });
    }

    analyze(lines);
  };
  reader.readAsArrayBuffer(file);
}

function handleText(file){
  const reader = new FileReader();
  reader.onload = e=>{
    const lines = e.target.result.split("\n");
    analyze(lines);
  };
  reader.readAsText(file);
}

// ---------------- EXTRACTION ENGINE ----------------
function analyze(lines){
  const data = extractFinancials(lines);

  if(Object.keys(data).length===0){
    resultsDiv.innerHTML = "<b>No usable financial data detected.</b>";
    return;
  }

  const kpis = computeKPIs(data);
  const anomalies = detectAnomalies(data, kpis);
  const insights = generateInsights(data, kpis, anomalies);

  render(data, kpis, anomalies, insights);
}

// ---------------- SMART EXTRACTION ----------------
function extractFinancials(lines){
  const patterns = {
    revenue: /revenue|sales/i,
    cogs: /cost of goods|cogs/i,
    opex: /operating expense/i,
    netIncome: /net income|profit/i,
    ebitda: /ebitda/i,
    assets: /total assets/i,
    liabilities: /total liabilities/i,
    equity: /equity/i
  };

  let data={};

  lines.forEach(line=>{
    const num = extractNumber(line);
    if(num===null) return;

    for(let key in patterns){
      if(patterns[key].test(line)){
        data[key]=num;
      }
    }
  });

  return data;
}

// ---------------- NUMBER PARSER ----------------
function extractNumber(text){
  const match = text.match(/-?\$?\(?\d{1,3}(,\d{3})*(\.\d+)?\)?/);
  if(!match) return null;

  let n = match[0]
    .replace(/[$,]/g,"")
    .replace("(","-")
    .replace(")","");

  return parseFloat(n);
}

// ---------------- KPI ENGINE ----------------
function computeKPIs(d){
  const revenue = d.revenue||0;
  const cogs = d.cogs||0;
  const opex = d.opex||0;

  const grossProfit = revenue - cogs;
  const ebitda = d.ebitda || (grossProfit - opex);
  const netIncome = d.netIncome || (ebitda);

  return {
    revenue,
    grossProfit,
    ebitda,
    netIncome,
    grossMargin: revenue ? (grossProfit/revenue)*100 : 0,
    ebitdaMargin: revenue ? (ebitda/revenue)*100 : 0,
    netMargin: revenue ? (netIncome/revenue)*100 : 0
  };
}

// ---------------- ANOMALY DETECTION ----------------
function detectAnomalies(d,k){
  let issues=[];

  if(k.grossMargin < 0)
    issues.push("Negative gross margin → possible pricing or cost issue");

  if(k.ebitdaMargin > 60)
    issues.push("Unusually high EBITDA margin");

  if(k.netMargin < 0)
    issues.push("Company is losing money");

  if(d.assets && d.liabilities && d.liabilities > d.assets)
    issues.push("Liabilities exceed assets → solvency risk");

  if(k.revenue && k.ebitda > k.revenue)
    issues.push("EBITDA exceeds revenue → data inconsistency");

  return issues;
}

// ---------------- INSIGHT GENERATION ----------------
function generateInsights(d,k,issues){
  let insights=[];

  if(k.ebitdaMargin > 25)
    insights.push("Strong operational profitability");

  if(k.netMargin < 10)
    insights.push("Low bottom-line efficiency");

  if(issues.length>0)
    insights.push("Financial irregularities detected requiring review");

  if(d.assets && d.liabilities){
    if(d.assets > d.liabilities)
      insights.push("Balance sheet appears stable");
    else
      insights.push("Balance sheet risk detected");
  }

  return insights;
}

// ---------------- RENDER ----------------
function render(d,k,issues,insights){
  let html = "<h3>Financial Data</h3><ul>";
  for(let key in d){
    html+=`<li><b>${key}</b>: $${d[key]}</li>`;
  }
  html+="</ul>";

  html+="<h3>KPIs</h3><ul>";
  for(let key in k){
    html+=`<li>${key}: ${typeof k[key]==="number" ? k[key].toFixed(2) : k[key]}</li>`;
  }
  html+="</ul>";

  html+="<h3>Anomalies</h3><ul>";
  issues.forEach(i=> html+=`<li>${i}</li>`);
  html+="</ul>";

  html+="<h3>Insights</h3><ul>";
  insights.forEach(i=> html+=`<li>${i}</li>`);
  html+="</ul>";

  resultsDiv.innerHTML = html;
}
</script>

</body>
</html>
